name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/generate-metrics.yml

concurrency:
  group: profile-output-branch
  cancel-in-progress: false

jobs:
  generate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Render metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          output_action: none
          filename: github-metrics.svg
          config_timezone: Asia/Kolkata
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_colors: red
          plugin_topics: yes
          plugin_topics_limit: 10
          plugin_followup: yes
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_lines: yes

      - name: Collect metrics output
        run: cp /metrics_renders/github-metrics.svg dist/

      - name: Verify metrics output
        run: test -s dist/github-metrics.svg

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update github metrics"
