name: Generate All Profile Assets

on:
  workflow_dispatch:

concurrency:
  group: profile-output-branch
  cancel-in-progress: false

jobs:
  generate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Copy transformer architecture graphic
        run: cp assets/transformer-architecture.svg dist/transformer-architecture.svg

      - name: Verify generated assets
        run: test -s dist/transformer-architecture.svg

      - name: Publish all assets to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: regenerate profile assets"
