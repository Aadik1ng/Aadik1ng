name: Generate All Profile Assets

on:
  workflow_dispatch:

concurrency:
  group: profile-output-branch
  cancel-in-progress: false

jobs:
  generate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Copy transformer architecture graphic
        run: cp assets/transformer-architecture.svg dist/transformer-architecture.svg

      - name: Isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          output_action: none
          filename: github-isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Collect isocalendar output
        run: cp /metrics_renders/github-isocalendar.svg dist/

      - name: Recolor calendar to red and black theme
        run: pwsh .github/scripts/recolor-isocalendar.ps1 -SvgPath dist/github-isocalendar.svg

      - name: Verify generated assets
        run: |
          test -s dist/transformer-architecture.svg
          test -s dist/github-isocalendar.svg

      - name: Publish all assets to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: regenerate profile assets"
