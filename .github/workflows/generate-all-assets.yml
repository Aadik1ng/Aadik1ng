name: Generate All Profile Assets

on:
  workflow_dispatch:

concurrency:
  group: profile-output-branch
  cancel-in-progress: false

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Copy transformer architecture graphic
        run: cp assets/transformer-architecture.svg dist/transformer-architecture.svg

      - name: Metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          output_action: none
          filename: github-metrics.svg
          config_timezone: Asia/Kolkata
          base: header, activity
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%
          plugin_languages_colors: red
          plugin_lines: yes

      - name: Remove zero-value metrics
        run: python3 .github/scripts/prune-zero-metrics.py github-metrics.svg

      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          output_action: none
          filename: github-isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Collect generated assets
        run: |
          cp /metrics_renders/github-metrics.svg dist/
          cp /metrics_renders/github-isocalendar.svg dist/

      - name: Verify generated assets
        run: |
          ls -la dist
          test -s dist/transformer-architecture.svg
          test -s dist/github-metrics.svg
          test -s dist/github-isocalendar.svg

      - name: Publish all assets to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: regenerate all profile assets"
