name: Generate Transformer Graphic

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/generate-transformer-graphic.yml
      - assets/transformer-architecture.svg

concurrency:
  group: profile-output-branch
  cancel-in-progress: false

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Stage transformer architecture graphic
        run: |
          mkdir -p dist
          cp assets/transformer-architecture.svg dist/transformer-architecture.svg
          test -s dist/transformer-architecture.svg

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update transformer architecture graphic"
