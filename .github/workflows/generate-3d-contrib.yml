name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/generate-3d-contrib.yml

concurrency:
  group: profile-output-branch
  cancel-in-progress: false

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Aadik1ng

      - name: Stage 3D assets
        run: |
          mkdir -p dist
          cp profile-3d-contrib/profile-green-animate.svg dist/github-profile-3d-animate.svg
          cp profile-3d-contrib/profile-night-view.svg dist/github-profile-3d.svg
          cp profile-3d-contrib/profile-gitblock.svg dist/github-profile-3d-gitblock.svg

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update 3D contribution graph"
