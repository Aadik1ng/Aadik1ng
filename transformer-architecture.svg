<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" role="img" aria-label="Animated Transformer encoder architecture">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="block" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d41414"/>
      <stop offset="100%" stop-color="#ff2020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ff2020"/>
    </marker>
  </defs>

  <rect width="920" height="320" rx="14" fill="url(#bg)" stroke="#2a1212" stroke-width="1.5"/>

  <text x="460" y="28" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Transformer Encoder  Multi-Head Self-Attention</text>
  <text x="460" y="46" fill="#888" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">Token embeddings Æ N stacked blocks Æ contextual representations</text>

  <!-- Input tokens -->
  <g id="input">
    <text x="52" y="88" fill="#aaa" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle">Input</text>
    <rect x="20" y="98" width="64" height="130" rx="8" fill="#151515" stroke="#3a1212"/>
    <rect x="30" y="112" width="44" height="18" rx="4" fill="#2a1212" stroke="#d41414" stroke-width="0.8"/>
    <rect x="30" y="138" width="44" height="18" rx="4" fill="#2a1212" stroke="#6b1515" stroke-width="0.8"/>
    <rect x="30" y="164" width="44" height="18" rx="4" fill="#2a1212" stroke="#6b1515" stroke-width="0.8"/>
    <rect x="30" y="190" width="44" height="18" rx="4" fill="#2a1212" stroke="#6b1515" stroke-width="0.8"/>
    <text x="52" y="125" fill="#ff2020" font-family="monospace" font-size="9" text-anchor="middle">tok</text>
    <text x="52" y="151" fill="#d41414" font-family="monospace" font-size="9" text-anchor="middle">tok</text>
    <text x="52" y="177" fill="#d41414" font-family="monospace" font-size="9" text-anchor="middle">tok</text>
    <text x="52" y="203" fill="#d41414" font-family="monospace" font-size="9" text-anchor="middle">tok</text>
  </g>

  <!-- Embedding + positional -->
  <g id="embed">
    <rect x="108" y="118" width="72" height="90" rx="8" fill="url(#block)" stroke="#d41414" stroke-width="1"/>
    <text x="144" y="142" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Embedding</text>
    <text x="144" y="158" fill="#888" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">+ Pos Enc</text>
    <line x1="124" y1="168" x2="164" y2="168" stroke="#3a1212" stroke-width="1"/>
    <line x1="124" y1="178" x2="164" y2="178" stroke="#6b1515" stroke-width="1"/>
    <line x1="124" y1="188" x2="164" y2="188" stroke="#a81818" stroke-width="1"/>
  </g>

  <!-- Transformer blocks -->
  <g id="blocks">
    <!-- Block 1 -->
    <g transform="translate(210, 72)">
      <rect width="130" height="176" rx="10" fill="url(#block)" stroke="#3a1212" stroke-width="1.2"/>
      <text x="65" y="20" fill="#ff2020" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Block ūN</text>
      <rect x="12" y="32" width="106" height="36" rx="6" fill="#1f1010" stroke="#d41414" stroke-width="1"/>
      <text x="65" y="48" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Multi-Head</text>
      <text x="65" y="60" fill="#d41414" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Self-Attention</text>
      <!-- attention heads -->
      <circle cx="30" cy="50" r="3" fill="#ff2020"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="50" cy="50" r="3" fill="#d41414"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="50" r="3" fill="#ff2020"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="90" cy="50" r="3" fill="#d41414"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
      <rect x="12" y="76" width="106" height="18" rx="4" fill="#181818" stroke="#444" stroke-width="0.8"/>
      <text x="65" y="88" fill="#888" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Add &amp; LayerNorm</text>
      <rect x="12" y="102" width="106" height="30" rx="6" fill="#1f1010" stroke="#6b1515" stroke-width="1"/>
      <text x="65" y="120" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">Feed Forward</text>
      <rect x="12" y="140" width="106" height="18" rx="4" fill="#181818" stroke="#444" stroke-width="0.8"/>
      <text x="65" y="152" fill="#888" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Add &amp; LayerNorm</text>
    </g>

    <!-- Block 2 (duplicate visual) -->
    <g transform="translate(360, 72)">
      <rect width="130" height="176" rx="10" fill="url(#block)" stroke="#3a1212" stroke-width="1.2" opacity="0.85"/>
      <rect x="12" y="32" width="106" height="36" rx="6" fill="#1f1010" stroke="#a81818" stroke-width="1"/>
      <text x="65" y="48" fill="#ccc" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Multi-Head</text>
      <text x="65" y="60" fill="#d41414" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Self-Attention</text>
      <rect x="12" y="76" width="106" height="18" rx="4" fill="#181818" stroke="#444" stroke-width="0.8"/>
      <rect x="12" y="102" width="106" height="30" rx="6" fill="#1f1010" stroke="#6b1515" stroke-width="1"/>
      <text x="65" y="120" fill="#ccc" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">Feed Forward</text>
      <rect x="12" y="140" width="106" height="18" rx="4" fill="#181818" stroke="#444" stroke-width="0.8"/>
      <text x="65" y="168" fill="#666" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">ĘĘĘ</text>
    </g>

    <!-- Block N -->
    <g transform="translate(510, 72)">
      <rect width="130" height="176" rx="10" fill="url(#block)" stroke="#d41414" stroke-width="1.2"/>
      <text x="65" y="20" fill="#ff2020" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Block N</text>
      <rect x="12" y="32" width="106" height="36" rx="6" fill="#1f1010" stroke="#ff2020" stroke-width="1"/>
      <text x="65" y="48" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Multi-Head</text>
      <text x="65" y="60" fill="#ff2020" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Self-Attention</text>
      <rect x="12" y="76" width="106" height="18" rx="4" fill="#181818" stroke="#444" stroke-width="0.8"/>
      <rect x="12" y="102" width="106" height="30" rx="6" fill="#1f1010" stroke="#d41414" stroke-width="1"/>
      <text x="65" y="120" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">Feed Forward</text>
      <rect x="12" y="140" width="106" height="18" rx="4" fill="#181818" stroke="#444" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Output -->
  <g id="output">
    <text x="848" y="88" fill="#aaa" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle">Output</text>
    <rect x="816" y="98" width="64" height="130" rx="8" fill="#151515" stroke="#d41414" stroke-width="1"/>
    <rect x="826" y="112" width="44" height="18" rx="4" fill="#2a1212" stroke="#ff2020" stroke-width="0.8"/>
    <rect x="826" y="138" width="44" height="18" rx="4" fill="#2a1212" stroke="#d41414" stroke-width="0.8"/>
    <rect x="826" y="164" width="44" height="18" rx="4" fill="#2a1212" stroke="#d41414" stroke-width="0.8"/>
    <rect x="826" y="190" width="44" height="18" rx="4" fill="#2a1212" stroke="#d41414" stroke-width="0.8"/>
    <text x="848" y="125" fill="#ff2020" font-family="monospace" font-size="9" text-anchor="middle">hü</text>
    <text x="848" y="151" fill="#d41414" font-family="monospace" font-size="9" text-anchor="middle">hé</text>
    <text x="848" y="177" fill="#d41414" font-family="monospace" font-size="9" text-anchor="middle">hā</text>
    <text x="848" y="203" fill="#d41414" font-family="monospace" font-size="9" text-anchor="middle">hä</text>
  </g>

  <!-- Flow arrows -->
  <path d="M84 163 H108" stroke="url(#accent)" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M180 163 H210" stroke="url(#accent)" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M340 163 H360" stroke="#a81818" stroke-width="1.5" marker-end="url(#arrow)" fill="none" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M490 163 H510" stroke="#a81818" stroke-width="1.5" marker-end="url(#arrow)" fill="none" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M640 163 H816" stroke="url(#accent)" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- Attention matrix mini viz -->
  <g transform="translate(670, 98)">
    <rect width="120" height="120" rx="8" fill="#111" stroke="#3a1212" stroke-width="1"/>
    <text x="60" y="18" fill="#888" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">Attention Map</text>
    <g transform="translate(20, 28)">
      <rect x="0" y="0" width="16" height="16" fill="#2a1212"><animate attributeName="fill" values="#2a1212;#ff2020;#2a1212" dur="3s" repeatCount="indefinite"/></rect>
      <rect x="20" y="0" width="16" height="16" fill="#3a1212"><animate attributeName="fill" values="#3a1212;#d41414;#3a1212" dur="2.5s" repeatCount="indefinite"/></rect>
      <rect x="40" y="0" width="16" height="16" fill="#2a1212"><animate attributeName="fill" values="#2a1212;#a81818;#2a1212" dur="2.8s" repeatCount="indefinite"/></rect>
      <rect x="60" y="0" width="16" height="16" fill="#1a1a1a"/>
      <rect x="0" y="20" width="16" height="16" fill="#3a1212"><animate attributeName="fill" values="#3a1212;#d41414;#3a1212" dur="2.2s" repeatCount="indefinite"/></rect>
      <rect x="20" y="20" width="16" height="16" fill="#ff2020"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></rect>
      <rect x="40" y="20" width="16" height="16" fill="#6b1515"/>
      <rect x="60" y="20" width="16" height="16" fill="#2a1212"/>
      <rect x="0" y="40" width="16" height="16" fill="#2a1212"/>
      <rect x="20" y="40" width="16" height="16" fill="#a81818"><animate attributeName="fill" values="#a81818;#ff2020;#a81818" dur="2.4s" repeatCount="indefinite"/></rect>
      <rect x="40" y="40" width="16" height="16" fill="#d41414"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/></rect>
      <rect x="60" y="40" width="16" height="16" fill="#3a1212"/>
      <rect x="0" y="60" width="16" height="16" fill="#1a1a1a"/>
      <rect x="20" y="60" width="16" height="16" fill="#3a1212"/>
      <rect x="40" y="60" width="16" height="16" fill="#6b1515"><animate attributeName="fill" values="#6b1515;#d41414;#6b1515" dur="2.6s" repeatCount="indefinite"/></rect>
      <rect x="60" y="60" width="16" height="16" fill="#ff2020"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></rect>
    </g>
    <text x="60" y="112" fill="#666" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Q Ę K Æ softmax Ę V</text>
  </g>

  <!-- Animated token flow particles -->
  <circle r="4" fill="#ff2020" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M52 163 H848 163"/>
  </circle>
  <circle r="3" fill="#d41414" opacity="0.8">
    <animateMotion dur="4s" begin="1.3s" repeatCount="indefinite" path="M52 163 H848 163"/>
  </circle>
  <circle r="2.5" fill="#ff2020" opacity="0.6">
    <animateMotion dur="4s" begin="2.6s" repeatCount="indefinite" path="M52 163 H848 163"/>
  </circle>

  <!-- Residual skip connection arc -->
  <path d="M275 248 C275 280, 575 280, 575 248" stroke="#d41414" stroke-width="1.2" fill="none" stroke-dasharray="5 4" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="18" to="0" dur="2s" repeatCount="indefinite"/>
  </path>
  <text x="425" y="298" fill="#888" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">Residual connections Ę Layer normalization Ę Scaled dot-product attention</text>
</svg>
